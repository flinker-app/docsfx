<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; flex-direction: column; height: 100vh; }
    bim-grid { flex: 1; }
  </style>
</head>
<body>

  <bim-grid id="ifc-viewer"></bim-grid>

  <script type="module">
    import { IfcViewer } from "https://cdn.flinker.app/ifc-viewer/v3.1.0/ifc-viewer.es.js";

    const viewer = new IfcViewer("#ifc-viewer");
    await viewer.ready;

    const base = "https://thatopen.github.io/engine_components/resources/frags/";
    for (const name of ["school_arq.frag", "school_str.frag"]) {
      const bytes = new Uint8Array(await (await fetch(base + name)).arrayBuffer());
      await viewer.add(name, bytes);
    }
  </script>

</body>
</html>
