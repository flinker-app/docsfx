# Your GitHub workflow file under .github/workflows/
# Trigger the action on push to main
on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
  
jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5
    
    # Set up Dotnet
    - name: Dotnet Setup
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x

    - name: Node Setup
      uses: actions/setup-node@v4
      with:
        node-version: 24

    # Install DocFX as a global tool
    - run: dotnet tool update -g docfx

    # Generate file metadata consumed by docfx.json
    - run: node scripts/generate-last-updated.js

    # Build the documentation using docfx.json in the root directory
    - run: docfx docfx.json

    - name: Remove generated source maps
      run: find _site -type f -name '*.map' -delete

    - name: Report site size
      run: |
        du -sh _site
        echo "Largest generated site files:"
        find _site -type f -printf '%s %p\n' | sort -nr | head -20

    # Upload the site files generated in the _site directory
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # Upload the _site directory containing the generated site
        path: './_site'

    # Deploy the site to GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
